title: OpenClaw Tutorials
description: Comprehensive tutorial series for OpenClaw AI agent gateway
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Navigation
nav:
  - title: Home
    url: /
  - title: Gateway Fundamentals
    url: /01-gateway-fundamentals/
  - title: Session Management
    url: /02-session-management/
  - title: Memory Systems
    url: /03-memory-systems/
  - title: Sub-Agents
    url: /04-sub-agents/
  - title: Skills & Plugins
    url: /05-skills-and-plugins/

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
